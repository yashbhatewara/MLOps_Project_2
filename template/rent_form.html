<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Rent Estimator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
            --input-bg: #0f172a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--bg-card);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 650px;
            border: 1px solid var(--border);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.25rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-dim);
        }

        input,
        select {
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus,
        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        .primary-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 0.75rem;
            padding: 1rem;
            font-weight: 600;
            font-size: 1.125rem;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 1rem;
            width: 100%;
        }

        .primary-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .primary-btn:active {
            transform: translateY(0);
        }

        .result-card {
            margin-top: 2.5rem;
            padding: 1.5rem;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(192, 132, 252, 0.1));
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 1rem;
            text-align: center;
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0.9);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .result-card h2 {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
        }

        .rent-value {
            font-size: 3rem;
            font-weight: 800;
            color: #f8fafc;
        }

        .currency {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--text-dim);
            margin-left: 0.5rem;
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Rent Estimator</h1>

        <form action="/" method="post">
            <div class="form-grid">

                <div class="form-group full-width">
                    <label>Location</label>
                    <input type="text" name="Location" list="location-list"
                        placeholder="Search location (e.g. Dubai Marina)" required>
                    <datalist id="location-list">
                        <option value="Downtown Dubai">
                        <option value="Dubai Marina">
                        <option value="Business Bay">
                        <option value="Jumeirah Village Circle (JVC)">
                        <option value="Meydan City">
                        <option value="Yas Island">
                        <option value="Al Reem Island">
                        <option value="Al Taawun">
                        <option value="Khalifa City">
                        <option value="Sadiyat Island">
                    </datalist>
                </div>

                <div class="form-group">
                    <label>Property Size (Sqft)</label>
                    <input type="number" name="Area_in_sqft" placeholder="e.g. 1200" required>
                </div>

                <div class="form-group">
                    <label>Property Type</label>
                    <select name="Type" required>
                        <option value="Apartment">Apartment</option>
                        <option value="Villa">Villa</option>
                        <option value="Townhouse">Townhouse</option>
                        <option value="Penthouse">Penthouse</option>
                        <option value="Hotel Apartment">Hotel Apartment</option>
                        <option value="Residential Building">Residential Building</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Bedrooms</label>
                    <input type="number" name="Beds" value="1" min="0" required>
                </div>

                <div class="form-group">
                    <label>Bathrooms</label>
                    <input type="number" name="Baths" value="1" min="0" required>
                </div>

                <div class="form-group">
                    <label>Furnishing</label>
                    <select name="Furnishing" required>
                        <option value="Unfurnished">Unfurnished</option>
                        <option value="Furnished">Furnished</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Building Type</label>
                    <select name="is_high_rise" required>
                        <option value="1">High Rise / Luxury</option>
                        <option value="0">Low Rise / Standard</option>
                    </select>
                </div>

            </div>

            <button type="submit" class="primary-btn">Calculate Estimate</button>

            <!-- Hidden fields computed via JS -->
            <input type="hidden" name="Sqft_per_bed" value="0">
            <input type="hidden" name="Total_Rooms" value="0">

        </form>

        {% if prediction %}
        <div class="result-card">
            <h2>Estimated Monthly Rent</h2>
            <div class="rent-value">
                {{ "{:,.0f}".format(prediction) }}
                <span class="currency">AED</span>
            </div>
        </div>
        {% endif %}

    </div>

    <script>
        document.querySelector("form").addEventListener("submit", function () {
            const area = parseFloat(document.querySelector("[name='Area_in_sqft']").value) || 0;
            const beds = parseInt(document.querySelector("[name='Beds']").value) || 1;
            const baths = parseInt(document.querySelector("[name='Baths']").value) || 0;

            document.querySelector("[name='Sqft_per_bed']").value = (area / Math.max(beds, 1)).toFixed(2);
            document.querySelector("[name='Total_Rooms']").value = beds + baths;
        });

        // Clear prediction from URL after display so refresh clears it
        if (window.history.replaceState && window.location.search.includes('prediction')) {
            const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
            window.history.replaceState({}, document.title, cleanUrl);
        }
    </script>

</body>

</html>
